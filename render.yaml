services:
  - type: web
    name: classplus-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_PATH
        value: classplus_bot.db
      - key: DOWNLOAD_DIR
        value: downloads
      - key: LOG_LEVEL
        value: INFO
